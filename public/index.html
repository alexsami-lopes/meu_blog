<html>
<head>
    <meta charset="UTF-8">
    <title>Blog</title>
</head>
<body>

<h1>Meu Blog</h1>

<div id="posts"></div>

<a href="/novo_post.html">Novo Post</a>

<script>
async function carregar() {
    const res = await fetch("/api/posts");
    const data = await res.json();

    if (data.erro) {
        document.body.innerHTML += "<p>" + data.erro + "</p>";
        return;
    }

    const div = document.getElementById("posts");

    data.forEach(p => {
        div.innerHTML += `
            <h3>${p.author}</h3>
            <p>${p.message}</p>
            <small>${p.date}</small>
            <hr>
        `;
    });
}

carregar();
</script>

</body>
</html>
